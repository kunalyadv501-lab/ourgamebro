<!DOCTYPE html>
<html>
<head>
<title>4-Lane Car Racing</title>
<style>
/* CSS */
body { margin:0; overflow:hidden; font-family:Arial; background:#111; }
canvas { display:block; margin:auto; background:#222; }
#score { position:absolute; top:10px; left:10px; color:white; font-size:24px; z-index:5; }
#startScreen, #gameOverScreen { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); color:white; display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:10; }
button { padding:15px 30px; font-size:20px; cursor:pointer; }
#controls { position:absolute; bottom:20px; width:100%; display:flex; justify-content:center; gap:20px; z-index:5; }
@media(max-width:600px){ canvas{width:100%;height:auto;} .btn{padding:10px 15px; font-size:16px;} #score{font-size:18px;} }
</style>
</head>
<body>

<!-- Start Screen -->
<div id="startScreen">
  <h1>4-Lane Car Racing</h1>
  <button id="playBtn" class="btn">Start Game</button>
</div>

<!-- Game Over Screen -->
<div id="gameOverScreen" style="display:none;">
  <h1>Game Over!</h1>
  <p id="finalScore">Score: 0</p>
  <button id="restartBtn" class="btn">Restart</button>
</div>

<!-- Score -->
<div id="score">Score: 0</div>

<!-- Mobile Controls -->
<div id="controls">
  <button id="leftBtn" class="btn">⬅</button>
  <button id="rightBtn" class="btn">➡</button>
</div>

<!-- Canvas -->
<canvas id="gameCanvas" width="400" height="600"></canvas>

<script>
// JS

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const lanes = [50,150,250,350];  // 4 lanes
let playerLane = 1;
let enemies = [];
let score = 0;
let speed = 5;
let gameRunning = false;
let enemyInterval, scoreInterval;

// Images
const playerCar = new Image();
playerCar.src = "images/player.png";  // your uploaded player car image

const enemyCar = new Image();
enemyCar.src = "images/enemy.png";    // your uploaded enemy car image

// Draw player
function drawPlayer(){
  ctx.drawImage(playerCar, lanes[playerLane]-25, canvas.height-120, 50, 100);
}

// Draw enemies
function drawEnemies(){
  for(let e of enemies){
    ctx.drawImage(enemyCar, lanes[e.lane]-25, e.y, 50, 100);
  }
}

// Move enemies
function moveEnemies(){
  for(let e of enemies){
    e.y += speed;
    if(e.y + 100 >= canvas.height-120 && e.lane === playerLane){
      gameOver();
    }
  }
  enemies = enemies.filter(e => e.y < canvas.height);
}

// Create enemies (1 per lane)
function createEnemies(){
  enemies = [];
  for(let i=0;i<4;i++){
    enemies.push({lane:i, y:-150});
  }
}

// Update score
function updateScore(){
  score++;
  document.getElementById("score").innerText = "Score: "+score;
  if(score % 20 === 0){
    speed += 1; // increase speed every 20 points
  }
}

// Draw Loop
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Lane dividers
  for(let i=1;i<4;i++){
    ctx.fillStyle="#555";
    ctx.fillRect(lanes[i]-10,0,2,canvas.height);
  }

  drawPlayer();
  drawEnemies();
  moveEnemies();

  if(gameRunning) requestAnimationFrame(draw);
}

// Start Game
function startGame(){
  document.getElementById("startScreen").style.display="none";
  document.getElementById("gameOverScreen").style.display="none";
  playerLane=1; enemies=[]; score=0; speed=5;
  gameRunning=true;
  draw();
  enemyInterval = setInterval(createEnemies, 2000);
  scoreInterval = setInterval(updateScore, 1000);
}

// Game Over
function gameOver(){
  gameRunning = false;
  clearInterval(enemyInterval);
  clearInterval(scoreInterval);
  document.getElementById("finalScore").innerText = "Score: "+score;
  document.getElementById("gameOverScreen").style.display = "flex";
}

// Controls
function moveLeft(){ if(playerLane>0) playerLane--; }
function moveRight(){ if(playerLane<3) playerLane++; }

// Keyboard
document.addEventListener("keydown", e=>{
  if(!gameRunning) return;
  if(e.key==="ArrowLeft") moveLeft();
  if(e.key==="ArrowRight") moveRight();
});

// Mobile Buttons
document.getElementById("leftBtn").addEventListener("click", moveLeft);
document.getElementById("rightBtn").addEventListener("click", moveRight);

// Start/Restart buttons
document.getElementById("playBtn").addEventListener("click", startGame);
document.getElementById("restartBtn").addEventListener("click", startGame);

</script>
</body>
</html>
